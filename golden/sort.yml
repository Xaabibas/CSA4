source: |-
  var array = input_string();

  var n = &(array);

  var i = 1;

  while (i <= n) {
      var j = i + 1;
      var min = &(array + i);
      var min_index = i;

      while (j <= n) {
          var current = &(array + j);
          if (current < min) {
              min = current;
              min_index = j;
          }
          j = j + 1;
      }

      var tmp = &(array + i);
      &(array + i) = min;
      &(array + min_index) = tmp;
      i = i + 1;
  }

  print_string(array);
