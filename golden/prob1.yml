source: |-
  func generate_palindrome(a, b, c) {
    return 100001 * a + 10010 * b + 1100 * c;
  }
  var x = 9;
  var y = 9;
  var z = 9;

  while (x >= 0) {
    y = 9;
    while (y >= 0) {
        z = 9;
        while (z >= 0) {
            var p = generate_palindrome(x, y, z);
            var m = 990;
            while (m >= 100) {
                if (p % m == 0) {
                    var n = p / m;

                    if (n <= 999) {
                        print_int(p);
                        m = -1;
                        z = -1;
                        y = -1;
                        x = -1;
                    }

                }
                m = m - 11;
            }
            z = z - 1;
        }
        y = y - 1;
    }
    x = x - 1;
  }
